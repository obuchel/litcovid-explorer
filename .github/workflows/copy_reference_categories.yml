name: Copy reference categories

# One-time-per-need merge: pulls cat/hard_category/format from the
# whn-analytics.net reference JSON into data/mesh_category_tree.json for
# any PMID this repo also has, wherever this repo's own value is still
# blank. Dispatched from the React uploader app (App.jsx -> dispatchWorkflow),
# or manually from the Actions tab.
#
# NOTE: rename this pipeline's "workflowFile" entry in src/pipelines/registry.js
# to match wherever this file ends up (e.g. "copy_reference_categories.yml").

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Only check the first N of this repo's PMIDs (testing)"
        required: false
        default: ""
      dry_run:
        description: "Report what would change without writing or committing"
        required: false
        default: "false"
      force_refresh:
        description: "Ignore the cached reference download and re-fetch"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: copy-reference-categories
  cancel-in-progress: false

jobs:
  copy-categories:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ijson

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run merge
        env:
          LIMIT: ${{ github.event.inputs.limit }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
        run: |
          ARGS=()
          if [ -n "$LIMIT" ]; then ARGS+=(--limit "$LIMIT"); fi
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "$FORCE_REFRESH" = "true" ]; then ARGS+=(--force-refresh); fi
          python scripts/copy_reference_categories.py "${ARGS[@]}"

      - name: Final commit (in case the script's own checkpoint didn't cover everything)
        run: |
          git add data/mesh_category_tree.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Final: copy reference categories run [skip ci]"
            git pull --rebase --autostash
            git push
          else
            echo "Nothing left to commit."
          fi
