                const padding = 60; // room for labels sticking out past each node's own radius
                const scale = Math.min(4, Math.max(0.2, Math.min((width - padding) / spanX, (height - padding) / spanY)));
                const tx = width / 2 - scale * (x0 + x1) / 2;
                const ty = height / 2 - scale * (y0 + y1) / 2;
                svg.transition().duration(400).call(networkZoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
            });
        }

        function networkZoomIn() {
            if (networkZoomBehavior) d3.select('#network-svg').transition().duration(200).call(networkZoomBehavior.scaleBy, 1.3);
        }
        function networkZoomOut() {
            if (networkZoomBehavior) d3.select('#network-svg').transition().duration(200).call(networkZoomBehavior.scaleBy, 0.75);
        }
        function networkResetZoom() {
            if (networkZoomBehavior) d3.select('#network-svg').transition().duration(300).call(networkZoomBehavior.transform, d3.zoomIdentity);
        }

        function networkSetNodeCount(value) {
            networkNodeCount = parseInt(value, 10) || NETWORK_DEFAULT_NODE_COUNT;
            renderNetwork(lastNetworkDocs || []);
        }

        // ── Network export — download whatever's currently on screen for
        //    use in other tools (Gephi, Cytoscape, NetworkX/igraph, pandas,
        //    R, Excel...). Filename reflects the condition(s) currently
        //    searched, so it's identifiable later rather than a generic
        //    "network.csv" every time.
        function sanitizeFilename(str) {
            return (str || 'network')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '_')
                .replace(/^_+|_+$/g, '')
                .slice(0, 60) || 'network';
        }

        function networkFilenameBase() {
            if (selectedSubjects.length > 0) {
                return sanitizeFilename(selectedSubjects.slice(0, 3).join('_and_'));
            }
            const searchBox = document.getElementById('search-box');
            const query = searchBox && searchBox.value && searchBox.value.trim();
            if (query) {
                return sanitizeFilename(query);
            }
            const label = (DATASETS[currentTree] && DATASETS[currentTree].shortLabel) || currentTree || 'network';
            return sanitizeFilename(label);
        }

        function csvEscape(value) {
            const s = String(value === undefined || value === null ? '' : value);
            return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
        }

        function networkNodesCSV(exportNodes) {
            const hasTfidf = exportNodes.some(n => n.tfidf !== undefined);
            const hasCoreness = exportNodes.some(n => n.coreness !== undefined);
            const hasCommunity = exportNodes.some(n => n.community !== undefined);
            const hasDiseaseCategory = exportNodes.some(n => n.diseaseCategory);
            const cols = ['id', 'type', 'documents'];
            if (hasTfidf) cols.push('tfidf');
            if (hasCoreness) cols.push('coreness', 'core_periphery_group');
            if (hasCommunity) cols.push('community');
            if (hasDiseaseCategory) cols.push('mesh_second_level_category');
            const rows = [cols.join(',')];
            exportNodes.forEach(n => {
                const row = [n.id, n.type, n.count];
                if (hasTfidf) row.push(n.tfidf !== undefined ? n.tfidf.toFixed(6) : '');
                if (hasCoreness) row.push(n.coreness !== undefined ? n.coreness : '', n.corePeripheryGroup || '');
                if (hasCommunity) row.push(n.community !== undefined ? n.community + 1 : '');
                if (hasDiseaseCategory) row.push(n.diseaseCategory || '');
                rows.push(row.map(csvEscape).join(','));
            });
            return rows.join('\n');
        }

        function networkEdgesCSV(exportEdges) {
            const hasBridging = exportEdges.some(e => e.bridgingScore !== undefined && e.bridgingScore > -Infinity);
            const header = hasBridging ? 'source,target,weight,bridging_score' : 'source,target,weight';
            const rows = [header];
            exportEdges.forEach(e => {
                const s = e.source.id || e.source, t = e.target.id || e.target;
                const row = [s, t, e.weight];
                if (hasBridging) row.push(e.bridgingScore !== undefined && e.bridgingScore > -Infinity ? e.bridgingScore.toFixed(4) : '');
                rows.push(row.map(csvEscape).join(','));
            });
            return rows.join('\n');
        }

        function xmlEscape(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function networkGraphML(exportNodes, exportEdges) {
            // GraphML keeps nodes, edges, AND their attributes in one
            // self-contained file — opens directly in Gephi (File > Open)
            // and Cytoscape (File > Import > Network from File), and reads
            // natively with networkx.read_graphml() / igraph::read_graph().
            const hasTfidf = exportNodes.some(n => n.tfidf !== undefined);
            const hasCoreness = exportNodes.some(n => n.coreness !== undefined);
            const hasCommunity = exportNodes.some(n => n.community !== undefined);
            const hasDiseaseCategory = exportNodes.some(n => n.diseaseCategory);

            const hasBridging = exportEdges.some(e => e.bridgingScore !== undefined && e.bridgingScore > -Infinity);

            const keys = [
                '<key id="d_type" for="node" attr.name="type" attr.type="string"/>',
                '<key id="d_documents" for="node" attr.name="documents" attr.type="int"/>',
                '<key id="d_weight" for="edge" attr.name="weight" attr.type="double"/>',
            ];
            if (hasBridging) keys.push('<key id="d_bridging" for="edge" attr.name="bridging_score" attr.type="double"/>');
            if (hasTfidf) keys.push('<key id="d_tfidf" for="node" attr.name="tfidf" attr.type="double"/>');
            if (hasCoreness) {
                keys.push('<key id="d_coreness" for="node" attr.name="coreness" attr.type="int"/>');
                keys.push('<key id="d_cpgroup" for="node" attr.name="core_periphery_group" attr.type="string"/>');
            }
            if (hasCommunity) keys.push('<key id="d_community" for="node" attr.name="community" attr.type="int"/>');
            if (hasDiseaseCategory) keys.push('<key id="d_meshcat" for="node" attr.name="mesh_second_level_category" attr.type="string"/>');

            const nodeXml = exportNodes.map(n => {
                let attrs = `<data key="d_type">${xmlEscape(n.type)}</data><data key="d_documents">${n.count}</data>`;
                if (hasTfidf && n.tfidf !== undefined) attrs += `<data key="d_tfidf">${n.tfidf.toFixed(6)}</data>`;
                if (hasCoreness && n.coreness !== undefined) attrs += `<data key="d_coreness">${n.coreness}</data><data key="d_cpgroup">${xmlEscape(n.corePeripheryGroup || '')}</data>`;
                if (hasCommunity && n.community !== undefined) attrs += `<data key="d_community">${n.community + 1}</data>`;
                if (hasDiseaseCategory && n.diseaseCategory) attrs += `<data key="d_meshcat">${xmlEscape(n.diseaseCategory)}</data>`;
                return `<node id="${xmlEscape(n.id)}">${attrs}</node>`;
            }).join('\n    ');

            const edgeXml = exportEdges.map((e, i) => {
                const s = e.source.id || e.source, t = e.target.id || e.target;
                const bridgingAttr = (hasBridging && e.bridgingScore !== undefined && e.bridgingScore > -Infinity)
                    ? `<data key="d_bridging">${e.bridgingScore.toFixed(4)}</data>` : '';
                return `<edge id="e${i}" source="${xmlEscape(s)}" target="${xmlEscape(t)}"><data key="d_weight">${e.weight}</data>${bridgingAttr}</edge>`;
            }).join('\n    ');

            return `<?xml version="1.0" encoding="UTF-8"?>
<graphml xmlns="http://graphml.graphdrawing.org/xmlns">
  ${keys.join('\n  ')}
  <graph id="G" edgedefault="undirected">
    ${nodeXml}
    ${edgeXml}
  </graph>
</graphml>`;
        }

        function triggerDownload(filename, content, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function buildDownloadNetwork() {
            // Deliberately NOT reusing lastNetworkNodes/lastNetworkEdges —
            // those reflect the slider's current (render-safe) position.
            // Downloads recompute independently, up to NETWORK_HARD_MAX_NODES
            // subjects and NETWORK_DOWNLOAD_EDGE_CAP edges — both far more
            // permissive than the render caps, since a CSV/GraphML file
            // doesn't have to stay smooth as an SVG force layout does.
            const { nodes, edges } = buildCooccurrenceNetwork(
                lastNetworkDocs || [], NETWORK_HARD_MAX_NODES, networkSizeMode, NETWORK_DOWNLOAD_EDGE_CAP, networkEdgeRankMode, networkBridgingFilter
            );
            const diseaseSecondLevelMap = getDiseaseSecondLevelMap();
            nodes.forEach(n => { if (n.type === 'disease') n.diseaseCategory = diseaseSecondLevelMap.get(n.id) || null; });

            // Recompute coreness/community on this larger node set too, so
            // the export is consistent with whichever mode is on screen —
            // just computed at the more complete scale, not copied from the
            // (possibly much smaller) rendered set.
            if (networkLayoutMode === 'core-periphery') {
                const coreness = computeCoreness(nodes, edges);
                nodes.forEach(n => { n.coreness = coreness.get(n.id) || 0; });
                const sorted = nodes.map(n => n.coreness).sort((a, b) => a - b);
                const median = sorted[Math.floor(sorted.length / 2)];
                nodes.forEach(n => { n.corePeripheryGroup = n.coreness >= median ? 'core' : 'periphery'; });
            } else if (networkLayoutMode === 'community') {
                const { communityOfId } = detectCommunities(nodes.map(n => n.id), edges);
                nodes.forEach(n => { n.community = communityOfId.get(n.id) ?? 0; });
            }
            return { nodes, edges };
        }

        function networkDownload(format) {
            if (!lastNetworkDocs || !lastNetworkDocs.length) return;
            const btn = document.getElementById('network-download-btn');
            document.getElementById('network-download-menu').style.display = 'none';
            const originalLabel = btn.textContent;
            btn.textContent = '⏳ Preparing…';
            btn.disabled = true;
            // setTimeout lets the browser actually paint the "Preparing…"
            // label before the heavy synchronous computation below blocks
            // the main thread — without this the button would just freeze
            // looking unchanged for however long it takes.
            setTimeout(() => {
                try {
                    const { nodes, edges } = buildDownloadNetwork();
                    const base = networkFilenameBase();
                    if (format === 'nodes-csv') {
                        triggerDownload(`${base}_network_nodes.csv`, networkNodesCSV(nodes), 'text/csv');
                    } else if (format === 'edges-csv') {
                        triggerDownload(`${base}_network_edges.csv`, networkEdgesCSV(edges), 'text/csv');
                    } else if (format === 'graphml') {
                        triggerDownload(`${base}_network.graphml`, networkGraphML(nodes, edges), 'application/xml');
                    }
                } finally {
                    btn.textContent = originalLabel;
                    btn.disabled = false;
                }
            }, 20);
        }

        function networkToggleDownloadMenu() {
            const menu = document.getElementById('network-download-menu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
        document.addEventListener('click', (event) => {
            const menu = document.getElementById('network-download-menu');
            const btn = document.getElementById('network-download-btn');
            if (menu && menu.style.display !== 'none' && !menu.contains(event.target) && event.target !== btn) {
                menu.style.display = 'none';
            }
        });

        function networkToggleSizeMode() {
            networkSizeMode = networkSizeMode === 'documents' ? 'tfidf' : 'documents';
            const btn = document.getElementById('network-size-btn');
            btn.textContent = networkSizeMode === 'tfidf' ? '📏 Size: TF-IDF' : '📏 Size: Documents';
            btn.style.background = networkSizeMode === 'tfidf' ? '#f97316' : '';
            btn.style.color = networkSizeMode === 'tfidf' ? 'white' : '';
            btn.style.borderColor = networkSizeMode === 'tfidf' ? '#f97316' : '';
            renderNetwork(lastNetworkDocs || []);
        }

        function networkToggleEdgeRankMode() {
            networkEdgeRankMode = networkEdgeRankMode === 'weight' ? 'bridging' : 'weight';
            const btn = document.getElementById('network-edgerank-btn');
            const active = networkEdgeRankMode === 'bridging';
            btn.textContent = active ? '🌉 Edges: Bridging' : '🌉 Edges: Strongest';
            btn.style.background = active ? '#f97316' : '';
            btn.style.color = active ? 'white' : '';
            btn.style.borderColor = active ? '#f97316' : '';
            document.getElementById('network-bridging-range-wrap').style.display = active ? 'flex' : 'none';
            if (!active) networkBridgingFilter = null; // filter is meaningless outside bridging mode
            renderNetwork(lastNetworkDocs || []);
        }

        // Keeps the two thumbs from crossing, redraws the highlighted band,
        // and updates the readout label — called on every drag tick (for
        // immediate visual feedback) but only triggers a re-render on
        // release (see the 'change' listeners below), since rebuilding the
        // network is the expensive part.
        function updateBridgingSliderVisual() {
            const minInput = document.getElementById('network-bridging-min-slider');
            const maxInput = document.getElementById('network-bridging-max-slider');
            let lo = parseFloat(minInput.value), hi = parseFloat(maxInput.value);
            if (lo > hi) { [lo, hi] = [hi, lo]; } // keep logically ordered without hard-blocking the drag
            const sliderMin = parseFloat(minInput.min), sliderMax = parseFloat(minInput.max);
            const span = Math.max(sliderMax - sliderMin, 1e-9);
            const fill = document.getElementById('network-bridging-track-fill');
            fill.style.left = (((lo - sliderMin) / span) * 100) + '%';
            fill.style.width = (((hi - lo) / span) * 100) + '%';
            document.getElementById('network-bridging-range-label').textContent = `${lo.toFixed(2)} to ${hi.toFixed(2)}`;
        }

        function updateBridgingSliderUI(bridgingScoreRange) {
            const wrap = document.getElementById('network-bridging-range-wrap');
            if (networkEdgeRankMode !== 'bridging' || !bridgingScoreRange) {
                wrap.style.display = 'none';
                return;
            }
            wrap.style.display = 'flex';
            const minInput = document.getElementById('network-bridging-min-slider');
            const maxInput = document.getElementById('network-bridging-max-slider');
            const { min, max } = bridgingScoreRange;
            minInput.min = maxInput.min = min;
            minInput.max = maxInput.max = max;
            const active = networkBridgingFilter;
            minInput.value = active ? Math.max(active.min, min) : min;
            maxInput.value = active ? Math.min(active.max, max) : max;
            updateBridgingSliderVisual();
        }

        function networkApplyBridgingFilter() {
            const minInput = document.getElementById('network-bridging-min-slider');
            const maxInput = document.getElementById('network-bridging-max-slider');
            let lo = parseFloat(minInput.value), hi = parseFloat(maxInput.value);
            if (lo > hi) [lo, hi] = [hi, lo];
            networkBridgingFilter = { min: lo, max: hi };
            renderNetwork(lastNetworkDocs || []);
        }

        function networkResetBridgingFilter() {
            networkBridgingFilter = null;
            renderNetwork(lastNetworkDocs || []);
        }

        // Event delegation, not direct listeners: the slider elements are
        // injected into the DOM via innerHTML at runtime (inside renderUI's
        // template), well after DOMContentLoaded has already fired — a
        // listener registered for that event would never run, and even a
        // direct getElementById().addEventListener() at script-parse time
        // would find nothing yet to attach to. Delegating on `document`
        // sidesteps element lifecycle entirely: it matches by id whenever
        // the event bubbles up, however many times the network re-renders.
        document.addEventListener('input', (event) => {
            if (event.target.id === 'network-bridging-min-slider' || event.target.id === 'network-bridging-max-slider') {
                updateBridgingSliderVisual();
            }
        });
        document.addEventListener('change', (event) => {
            if (event.target.id === 'network-bridging-min-slider' || event.target.id === 'network-bridging-max-slider') {
                networkApplyBridgingFilter();
            }
        });

        const NETWORK_LAYOUT_CYCLE = ['force', 'core-periphery', 'community'];
        const NETWORK_LAYOUT_LABEL = { force: '🎯 Layout: Standard', 'core-periphery': '🎯 Layout: Core/Periphery', community: '🎯 Layout: Communities' };
        function networkToggleLayout() {
            const idx = NETWORK_LAYOUT_CYCLE.indexOf(networkLayoutMode);
            networkLayoutMode = NETWORK_LAYOUT_CYCLE[(idx + 1) % NETWORK_LAYOUT_CYCLE.length];
            const btn = document.getElementById('network-layout-btn');
            const active = networkLayoutMode !== 'force';
            btn.textContent = NETWORK_LAYOUT_LABEL[networkLayoutMode];
            btn.style.background = active ? '#f97316' : '';
            btn.style.color = active ? 'white' : '';
            btn.style.borderColor = active ? '#f97316' : '';
            renderNetwork(lastNetworkDocs || []);
        }

        // Simple percentile helper (nearest-rank) — used to cap the impact
        // factor / citations bar charts against long-tail outliers.
        function percentile(values, p) {
            if (!values.length) return 0;
            const sorted = [...values].sort((a, b) => a - b);
            return sorted[Math.min(sorted.length - 1, Math.floor(p * sorted.length))];
        }

        let IMPACT_CAP = 10, CITATIONS_CAP = 100, CITATIONS_BIN = 10;

        function setupCrossfilter() {
            ndx = crossfilter(datasets[PRIMARY_ID].docs);
            treeDim = ndx.dimension(d => d.tree_category);

            // Impact factor / citations both have a long right tail — a
            // handful of extreme outliers (a citation count in the
            // thousands, say) previously blew out the linear x-axis and
            // crushed the entire useful distribution into the very first
            // bar (see the "one giant spike, empty chart" look). Capping
            // the BINNING value at the 97th percentile fixes that: outliers
            // still count, they're just grouped into the rightmost bar
            // instead of stretching the axis out to where nothing else is
            // visible. The underlying data (impact_factor / citation_count)
            // is untouched — only what a doc gets binned into is capped.
            const allDocs = datasets[PRIMARY_ID].docs;
            IMPACT_CAP = Math.ceil(percentile(allDocs.map(d => d.impact_factor).filter(v => v > 0), 0.97)) || 10;
            CITATIONS_CAP = Math.ceil(percentile(allDocs.map(d => d.citation_count).filter(v => v > 0), 0.97)) || 100;
            CITATIONS_BIN = CITATIONS_CAP > 500 ? 25 : CITATIONS_CAP > 100 ? 10 : 5;

            impactDim = ndx.dimension(d => Math.min(Math.floor(d.impact_factor), IMPACT_CAP));
            citationsDim = ndx.dimension(d => Math.min(Math.floor(d.citation_count / CITATIONS_BIN) * CITATIONS_BIN, CITATIONS_CAP));
            // Multi-value dimension: each doc contributes once per subject it has
            subjectDim = ndx.dimension(d => d.subjects_array.length ? d.subjects_array : ['Unknown'], true);
            doctypeDim = ndx.dimension(d => d.tree_category || 'Unknown');
            searchDim = ndx.dimension(d => d.pmid);
        }

        function populateFilters() {
            const treeSelect = document.getElementById('tree-select');
            const cats = [...new Set(datasets[PRIMARY_ID].docs.map(d => d.tree_category))].sort();
            cats.forEach(cat => {
                if (cat) {
                    const opt = document.createElement('option');
                    opt.value = cat; opt.textContent = cat;
                    treeSelect.appendChild(opt);
                }
            });
        }

        // ═══════════════════════════════════════════════════
        //  AUTOCOMPLETE SEARCH
        // ═══════════════════════════════════════════════════

        function setupEventListeners() {
            const searchBox = document.getElementById('search-box');
            const dropdown = document.getElementById('autocomplete-dropdown');

            searchBox.addEventListener('input', function () {
                const term = this.value.trim().toLowerCase();
                highlightedIndex = -1;
                if (term.length < 2) { dropdown.classList.remove('visible'); return; }

                const matches = allSubjects
                    .filter(s => s.nameLower.includes(term) && !selectedSubjects.includes(s.name))
                    .slice(0, 20);

                if (matches.length === 0) {
                    dropdown.innerHTML = '<div class="autocomplete-item" style="color:#9ca3af;cursor:default;">No matching subjects</div>';
                    dropdown.classList.add('visible');
                    return;
                }

                dropdown.innerHTML = matches.map((m, idx) => {
                    const si = m.nameLower.indexOf(term);
                    const before = m.name.slice(0, si);
                    const match = m.name.slice(si, si + term.length);
                    const after = m.name.slice(si + term.length);
                    return `<div class="autocomplete-item" data-index="${idx}" data-subject="${esc(m.name)}">
                        <span>${esc(before)}<span class="match-highlight">${esc(match)}</span>${esc(after)}</span>
                        <span class="doc-count">${m.count} docs</span>
                    </div>`;
                }).join('');
                dropdown.classList.add('visible');

                dropdown.querySelectorAll('.autocomplete-item[data-subject]').forEach(el => {
                    el.addEventListener('mousedown', function (e) {
                        e.preventDefault();
                        selectSubject(this.getAttribute('data-subject'));
                    });
                });
            });

            searchBox.addEventListener('keydown', function (e) {
                const items = dropdown.querySelectorAll('.autocomplete-item[data-subject]');
                if (!items.length || !dropdown.classList.contains('visible')) {
                    if (e.key === 'Enter') e.preventDefault();
                    return;
                }
                if (e.key === 'ArrowDown') { e.preventDefault(); highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1); hilite(items); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); highlightedIndex = Math.max(highlightedIndex - 1, 0); hilite(items); }
                else if (e.key === 'Enter') { e.preventDefault(); if (highlightedIndex >= 0) selectSubject(items[highlightedIndex].getAttribute('data-subject')); }
                else if (e.key === 'Escape') dropdown.classList.remove('visible');
            });

            searchBox.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('visible'), 200));
            searchBox.addEventListener('focus', function () { if (this.value.trim().length >= 2) this.dispatchEvent(new Event('input')); });

            document.getElementById('tree-select').addEventListener('change', function () {
                if (this.value) treeDim.filter(this.value); else treeDim.filterAll();
                dc.redrawAll(); focusedNodePath = null; updateDisplay();
            });

            document.getElementById('search-focus-filter').addEventListener('change', function () {
                searchFocusMode = this.value;
                if (selectedSubjects.length > 0) {
                    applySubjectFilter();
                    dc.redrawAll();
                    updateDisplay();
                }
            });
        }

        function hilite(items) {
            items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
            if (highlightedIndex >= 0) items[highlightedIndex].scrollIntoView({ block: 'nearest' });
        }

        function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        // ═══════════════════════════════════════════════════
        //  SUBJECT SELECTION
        // ═══════════════════════════════════════════════════

        function highlightSelectedSubjectBars() {
            // Subjects are now rendered as custom HTML filter lists — no dc row chart to highlight
        }

        function selectSubject(name) {
            if (selectedSubjects.includes(name)) return;
            selectedSubjects.push(name);
            networkNodeCount = NETWORK_DEFAULT_NODE_COUNT; // new search — start the network back at the default (most-readable) size
            networkBridgingFilter = null;
            document.getElementById('search-box').value = '';
            document.getElementById('autocomplete-dropdown').classList.remove('visible');
            applySubjectFilter(); renderSelectedTags(); focusedNodePath = null;
            listSelections.subjects.clear();
            listSelections.doctype.clear();
            subjectDim.filterAll();
            doctypeDim.filterAll();
            dc.redrawAll(); updateDisplay();
            highlightSelectedSubjectBars();
        }

        function removeSubject(name) {
            selectedSubjects = selectedSubjects.filter(s => s !== name);
            networkNodeCount = NETWORK_DEFAULT_NODE_COUNT;
            networkBridgingFilter = null;
            applySubjectFilter(); renderSelectedTags(); focusedNodePath = null;
            listSelections.subjects.clear();
            listSelections.doctype.clear();
            subjectDim.filterAll();
            doctypeDim.filterAll();
            dc.redrawAll(); updateDisplay();
            highlightSelectedSubjectBars();
        }

        // MeSH stopwords - too generic to use for title matching
        const MESH_STOPWORDS = new Set(['disease','diseases','disorder','disorders',
            'syndrome','syndromes','infection','infections','chronic','acute',
            'congenital','secondary','primary','associated','related']);

        // Returns the first discriminative word from a MeSH term.
        // "Hashimoto Disease" → "hashimoto", "Thyroid Diseases" → "thyroid"
        function meshKeyword(meshTerm) {
            const words = meshTerm.split(/[\s,\-]+/);
            for (const w of words) {
                const wl = w.toLowerCase();
                if (wl.length > 4 && !MESH_STOPWORDS.has(wl)) return wl;
            }
            return meshTerm.toLowerCase(); // fallback
        }

        function titleMatchesMesh(titleLower, meshTerm) {
            // Try full exact MeSH label first
            if (titleLower.includes(meshTerm.toLowerCase())) return true;
            // Then try the first discriminative keyword
            return titleLower.includes(meshKeyword(meshTerm));
        }

        function applySubjectFilter() {
            if (selectedSubjects.length === 0) { searchDim.filterAll(); return; }
            const selSet = new Set(selectedSubjects);
            const pmids = new Set();
            
            // Use the current tree's dataset
            const dataset = datasets[currentTree];
            
            dataset.docs.forEach(doc => {
                let matches = false;
                
                if (searchFocusMode === 'all') {
                    // Match if term appears anywhere in subjects
                    matches = doc.subjects_array.some(s => selSet.has(s));
                } else if (searchFocusMode === 'title') {
                    // Match if any root word of any selected MeSH term appears in title
                    const titleLower = doc.title_e.toLowerCase();
                    matches = selectedSubjects.some(subj => titleMatchesMesh(titleLower, subj));
                } else if (searchFocusMode === 'first-subject') {
                    // Match only if the first subject matches
                    const firstSubject = doc.subjects_array[0];
                    matches = firstSubject && selSet.has(firstSubject);
                }
                
                if (matches) pmids.add(doc.pmid);
            });
            
            searchDim.filterFunction(pmid => pmids.has(pmid));
        }

        function renderSelectedTags() {
            const el = document.getElementById('selected-subjects');
            if (!selectedSubjects.length) { el.innerHTML = ''; return; }
            el.innerHTML = selectedSubjects.map(s =>
                `<span class="subject-tag">${esc(s)}
                    <span class="remove-tag" onclick="removeSubject('${s.replace(/'/g, "\\'")}')">&times;</span>
                </span>`
            ).join('');
        }

        // ═══════════════════════════════════════════════════
        //  CHARTS
        // ═══════════════════════════════════════════════════

        function createCharts() {
            // Filtered groups: exclude zero-count bins so elasticX rescales to actual data range
            const impactRawGroup = impactDim.group();
            const impactGroup = { all: () => impactRawGroup.all().filter(d => d.value > 0) };

            const citationsRawGroup = citationsDim.group();
            const citationsGroup = { all: () => citationsRawGroup.all().filter(d => d.value > 0) };

            // Use container width for bar charts
            // Measure the real rendered width of the chart's own container
            // instead of guessing a fixed pixel value — a hardcoded width
            // that doesn't match the card's actual layout width is exactly
            // what caused the axis to spill out past the card's right edge.
            // clientWidth forces a synchronous layout, so this is accurate
            // immediately (no rAF/timeout needed here, unlike getBBox() on
            // SVG content that hasn't been drawn yet).
            const barW = document.getElementById('impact-chart').clientWidth || 290;
            const fmt = d3.format(',');
            // Labels the rightmost (capped) bin with a "+" so it's clear that
            // bar represents "this value or higher", not an exact value.
            const capTickFormat = cap => v => (v >= cap ? `${fmt(v)}+` : fmt(v));

            impactChart = dc.barChart('#impact-chart')
                .width(barW).height(200)
                .x(d3.scaleLinear())
                .brushOn(true).xAxisLabel('Impact Factor').yAxisLabel('Count')
                .dimension(impactDim).group(impactGroup)
                .xUnits(dc.units.fp.precision(1)) // bin width is 1 — matches Math.floor(impact_factor)
                .elasticY(true).elasticX(true)
                .xAxisPadding('10%')
                .barPadding(0.15).outerPadding(0.05)
                .renderHorizontalGridLines(true)
                .margins({top:10,right:15,bottom:40,left:50})
                .title(d => `Impact factor ${d.key >= IMPACT_CAP ? d.key + '+' : d.key}: ${fmt(d.value)} article${d.value === 1 ? '' : 's'}`)
                .on('filtered', chart => { updateRangeLabel('impact', chart, IMPACT_CAP, fmt); updateDisplay(); })
                .on('pretransition', chart => {
                    chart.selectAll('g.x text').style('font-size', '0.7rem');
                    chart.xAxis().ticks(6).tickFormat(capTickFormat(IMPACT_CAP));
                });

            citationsChart = dc.barChart('#citations-chart')
                .width(barW).height(200)
                .x(d3.scaleLinear())
                .brushOn(true).xAxisLabel(`Citations (binned by ${CITATIONS_BIN}s)`).yAxisLabel('Count')
                .dimension(citationsDim).group(citationsGroup)
                // Without this, dc.js assumes each bar is 1 unit wide regardless
                // of the actual bin size — with CITATIONS_BIN=10, that made bars
                // render ~10x too thin, with dead space between them looking
                // like isolated spikes instead of a contiguous histogram.
                .xUnits(dc.units.fp.precision(CITATIONS_BIN))
                .elasticY(true).elasticX(true)
                .xAxisPadding('10%')
                .barPadding(0.15).outerPadding(0.05)
                .renderHorizontalGridLines(true)
                .margins({top:10,right:15,bottom:40,left:50})
                .title(d => `Citations ${d.key >= CITATIONS_CAP ? d.key + '+' : d.key}\u2013${d.key + CITATIONS_BIN - 1}: ${fmt(d.value)} article${d.value === 1 ? '' : 's'}`)
                .on('filtered', chart => { updateRangeLabel('citations', chart, CITATIONS_CAP, fmt); updateDisplay(); })
                .on('pretransition', chart => {
                    chart.selectAll('g.x text').style('font-size', '0.7rem');
                    chart.xAxis().ticks(6).tickFormat(capTickFormat(CITATIONS_CAP));
                });

            // 'filtered' only fires on user interaction — set the initial
            // "All" label state explicitly so it's correct on first render.
            updateRangeLabel('impact', impactChart, IMPACT_CAP, fmt);
            updateRangeLabel('citations', citationsChart, CITATIONS_CAP, fmt);

            // Subjects and Doc Types are rendered as custom HTML lists (see renderFilterList)
        }

        // Reflects the brush's current selection (or "All" if cleared) next
        // to each chart's title — dc.js's brush IS the range slider, this
        // just narrates what it's currently set to.
        function updateRangeLabel(key, chart, cap, fmt) {
            const el = document.getElementById(`${key}-range-label`);
            if (!el) return;
            const range = chart.filter(); // [lo, hi] while brushed, else null/undefined
            if (!range) { el.textContent = 'All'; return; }
            const [lo, hi] = range;
            const hiLabel = hi >= cap ? `${fmt(Math.floor(hi))}+` : fmt(Math.floor(hi));
            el.textContent = `${fmt(Math.floor(lo))}–${hiLabel}`;
        }

        function clearRangeFilter(key) {
            const chart = key === 'impact' ? impactChart : citationsChart;
            if (!chart) return;
            chart.filterAll();
            dc.redrawAll();
            updateDisplay();
        }

        // ═══════════════════════════════════════════════════
        //  CUSTOM FILTER LISTS (Subjects + Doc Types)
        // ═══════════════════════════════════════════════════

        // Tracks which keys are selected in each custom list
        const listSelections = { subjects: new Set(), doctype: new Set() };

        function renderFilterList(containerId, items, listKey, dim) {
            // items = [{key, value}] already sorted, value > 0
            const el = document.getElementById(containerId);
            if (!el) return;
            const maxVal = items.length ? items[0].value : 1;
            const selected = listSelections[listKey];
            const anySelected = selected.size > 0;

            el.innerHTML = items.map(item => {
                const pct = Math.max(2, (item.value / maxVal) * 100);
                const isSel = selected.has(item.key);
                const isDim = anySelected && !isSel;
                return `<div class="filter-list-item${isSel ? ' selected' : ''}${isDim ? ' deselected' : ''}"
                             onclick="toggleListItem('${listKey}','${item.key.replace(/'/g,"\'")}')"
                             title="${item.key} (${item.value})">
                    <div class="filter-list-bar" style="width:${pct}%"></div>
                    <span class="filter-list-label">${item.key}</span>
                    <span class="filter-list-count">${item.value.toLocaleString()}</span>
                </div>`;
            }).join('');
        }

        function toggleListItem(listKey, key) {
            const sel = listSelections[listKey];
            if (sel.has(key)) sel.delete(key); else sel.add(key);
            applyListFilters();
            dc.redrawAll();
            updateDisplay();
        }

        function applyListFilters() {
            // Subjects list → filter subjectDim
            const subjSel = listSelections.subjects;
            if (subjSel.size === 0) {
                subjectDim.filterAll();
            } else {
                subjectDim.filterFunction(d => {
                    if (Array.isArray(d)) return d.some(v => subjSel.has(v));
                    return subjSel.has(d);
                });
            }
            // Doc type list → filter doctypeDim
            const dtSel = listSelections.doctype;
            if (dtSel.size === 0) {
                doctypeDim.filterAll();
            } else {
                doctypeDim.filterFunction(d => dtSel.has(d));
            }
        }

        function updateFilterLists() {
            // Build subject counts from current crossfilter state
            const subjGroup = subjectDim.group().all().filter(d => d.value > 0)
                .sort((a,b) => b.value - a.value);
            renderFilterList('subjects-list', subjGroup, 'subjects', subjectDim);

            // Build doc type counts
            const dtGroup = doctypeDim.group().all().filter(d => d.value > 0)
                .sort((a,b) => b.value - a.value);
            renderFilterList('doctype-list', dtGroup, 'doctype', doctypeDim);
        }

        // ═══════════════════════════════════════════════════
        //  UPDATE PIPELINE
        // ═══════════════════════════════════════════════════

        function updateDisplay() {
            let filteredData;

            if (currentTree === PRIMARY_ID) {
                filteredData = ndx.allFiltered();
            } else {
                filteredData = getFilteredDocsGeneric(datasets[currentTree].docs);
            }

            updateFilterStats(filteredData);
            rebuildTree(filteredData);
            updateTable(filteredData);
            updateFilterLists();
            renderNetwork(filteredData);
        }

        /**
         * Return the subset of a non-primary dataset's docs that pass the
         * currently active filters:
         *  - selectedSubjects  (+ searchFocusMode)
         * (Impact / citations bar charts and the subject/doctype quick-filter
         *  lists are all tied to the PRIMARY_ID crossfilter and are hidden /
         *  irrelevant when a non-primary tree is shown, so we skip them here —
         *  same simplification the original code used for the chemical tree,
         *  now applied to every non-primary dataset generically.)
         */
        function getFilteredDocsGeneric(docs) {
            docs = docs || [];
            if (selectedSubjects.length === 0) return docs;

            const selSet = new Set(selectedSubjects);
            return docs.filter(doc => {
                if (searchFocusMode === 'all') {
                    return doc.subjects_array.some(s => selSet.has(s));
                } else if (searchFocusMode === 'title') {
                    const titleLower = (doc.title_e || '').toLowerCase();
                    return selectedSubjects.some(subj => titleMatchesMesh(titleLower, subj));
                } else if (searchFocusMode === 'first-subject') {
                    return doc.subjects_array[0] && selSet.has(doc.subjects_array[0]);
                }
                return false;
            });
        }

        function updateFilterStats(filteredData) {
            const stats = document.getElementById('filter-stats');
            const dataset = datasets[currentTree];
            const total = dataset.docs.length;
            const filtered = filteredData.length;
            const pct = ((filtered / total) * 100).toFixed(1);
            let extra = selectedSubjects.length ? ` | Filtered by ${selectedSubjects.length} subject(s)` : '';
            stats.innerHTML = `<strong>Showing ${filtered.toLocaleString()} of ${total.toLocaleString()} articles</strong> (${pct}%)${extra}`;
        }

        // ═══════════════════════════════════════════════════════════════
        //  TREE BUILDING — match subjects against LAST level only,
        //  single root (no Diseases→Diseases duplication)
        // ═══════════════════════════════════════════════════════════════

        function rebuildTree(filteredData) {
            const treeData = datasets[currentTree].tree;
            fullRawRoot = buildTreeFromData(treeData, filteredData);

            if (focusedNodePath) {
                const sub = findNodeByPath(fullRawRoot, focusedNodePath);
                rawRoot = sub ? deepCopy(sub) : fullRawRoot;
            } else {
                rawRoot = fullRawRoot;
            }
            renderTree();
            // Refresh dropdown counts after tree rebuild
            setTimeout(populateSubtreeDropdown, 100);
        }

        function buildTreeFromData(treeData, docs) {
            // ── 1. Collect subjects → PMIDs from filtered docs ──
            const docsBySubject = new Map();
            docs.forEach(doc => {
                (doc.subjects_array || []).forEach(subj => {
                    const s = subj.trim();
                    if (!s) return;
                    if (!docsBySubject.has(s)) docsBySubject.set(s, new Set());
                    docsBySubject.get(s).add(doc.pmid);
                });
            });

            // ── 2. For each tree row, match LAST segment against subjects ──
            const nodesByPath = new Map();

            treeData.forEach(item => {
                const path = item.first;
                const parts = path.split('.').map(p => p.trim()).filter(p => p);
                if (parts.length === 0) return;

                const leafName = parts[parts.length - 1];
                if (!docsBySubject.has(leafName)) return;

                // Build ancestor chain
                let parentPath = null;
                parts.forEach((part, idx) => {
                    const curPath = parts.slice(0, idx + 1).join('.');
                    if (!nodesByPath.has(curPath)) {
                        const isLeaf = (idx === parts.length - 1);
                        nodesByPath.set(curPath, {
                            name: part,
                            children: [],
                            _path: curPath,
                            _parentPath: parentPath,
                            count: isLeaf ? (docsBySubject.get(part)?.size || 0) : 0,
                            _isMatchedLeaf: isLeaf
                        });
                    }
                    parentPath = curPath;
                });
            });

            // ── 3. Assemble parent→child relationships ──
            const topLevel = [];
            for (const [path, node] of nodesByPath) {
                if (node._parentPath && nodesByPath.has(node._parentPath)) {
                    const parent = nodesByPath.get(node._parentPath);
                    if (!parent.children.includes(node)) parent.children.push(node);
                } else {
                    topLevel.push(node);
                }
            }

            // ── 4. Create a SINGLE root ──
            // FIX: If there's exactly one top-level node, use it directly as root
            //       (avoids Diseases→Diseases or Chemicals→Chemicals)
            let rootNode;
            if (topLevel.length === 1) {
                rootNode = topLevel[0];
            } else {
                rootNode = {
                    name: DATASETS[currentTree].label,
                    children: topLevel,
                    _path: '__root__',
                    count: 0,
                    _isMatchedLeaf: false
                };
            }

            // ── 5. Propagate counts upward ──
            // BUG FIX: a MeSH term can be BOTH a directly-matched leaf AND an
            // ancestor of some other, more specific matched term (e.g.
            // "COVID-19" is itself tagged on thousands of docs, but also has
            // "Post-Acute COVID-19 Syndrome" nested under it in the tree).
            // The old version only counted a node's OWN direct matches when
            // it had zero children — as soon as it had even one child, it
            // switched to counting ONLY the children's union, silently
            // dropping every doc whose sole match was that node itself. A
            // node's own matches and its children's matches are unioned
            // together now, regardless of whether it has children.
            function propagate(node) {
                const all = new Set(docsBySubject.get(node.name) || []);
                if (node.children && node.children.length > 0) {
                    node.children.forEach(ch => {
                        propagate(ch).forEach(p => all.add(p));
                    });
                }
                node.count = all.size;
                return all;
            }
            propagate(rootNode);

            // ── 6. Sort children by count ──
            function sortKids(node) {
                if (node.children?.length) {
                    node.children.sort((a, b) => (b.count||0) - (a.count||0));
                    node.children.forEach(sortKids);
                }
            }
            sortKids(rootNode);

            // ── 7. Clean circular refs ──
            function clean(node) {
                delete node._parentPath;
                if (node.children) node.children.forEach(clean);
            }
            clean(rootNode);

            return rootNode;
        }

        function findNodeByPath(tree, targetPath) {
            if (tree._path === targetPath) return tree;
            if (tree.children) {
                for (const ch of tree.children) {
                    const f = findNodeByPath(ch, targetPath);
                    if (f) return f;
                }
            }
            return null;
        }

        function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

        function countVisibleNodes(node) {
            if (!node) return 0;
            let count = 1;
            if (node.children) {
                node.children.forEach(child => {
                    count += countVisibleNodes(child);
                });
            }
            return count;
        }

        // ═══════════════════════════════════════════════════
        //  TREE NODE TOOLTIP
        // ═══════════════════════════════════════════════════

        function showTooltip(event, d) {
            const tt = document.getElementById('tree-tooltip');
            const data = d.data;

            const hasChildren   = (data.children  && data.children.length  > 0);
            const hasHidden     = (data._children && data._children.length > 0);
            const childCount    = hasChildren ? data.children.length
                                : hasHidden   ? data._children.length : 0;
            const isLeaf        = !hasChildren && !hasHidden;
            const level         = d.depth;

            // Build short path (last 3 segments)
            const pathParts = (data._path || data.name).split('.');
            const shortPath = pathParts.length > 3
                ? '…' + pathParts.slice(-3).join(' › ')
                : pathParts.join(' › ');

            document.getElementById('tt-name').textContent     = data.name;
            document.getElementById('tt-docs').textContent     = (data.count || 0).toLocaleString();
            document.getElementById('tt-level').textContent    = level;
            document.getElementById('tt-children').textContent = isLeaf ? '—' : childCount + (hasHidden ? ' (collapsed)' : '');
            document.getElementById('tt-leaf').textContent     = isLeaf ? 'Yes' : 'No';
            document.getElementById('tt-path').textContent     = shortPath;

            tt.classList.add('visible');
            moveTooltip(event);
        }

        function moveTooltip(event) {
            const tt  = document.getElementById('tree-tooltip');
            const pad = 16;
            const tw  = tt.offsetWidth;
            const th  = tt.offsetHeight;
            let   tx  = event.clientX + pad;
            let   ty  = event.clientY + pad;
            if (tx + tw > window.innerWidth  - pad) tx = event.clientX - tw - pad;
            if (ty + th > window.innerHeight - pad) ty = event.clientY - th - pad;
            tt.style.left = tx + 'px';
            tt.style.top  = ty + 'px';
        }

        function hideTooltip() {
            document.getElementById('tree-tooltip').classList.remove('visible');
        }
        //  collapse/expand mutates raw data via d.data, update() reuses
        //  the same hierarchy.
        // ═══════════════════════════════════════════════════════════════

        function renderTree() {
            const container = d3.select('#tree-svg');
            const treeBorder = document.querySelector('.tree-border');
            const width = treeBorder.clientWidth;
            const height = treeBorder.clientHeight;

            container.selectAll('*').remove();
            nodeIdCounter = 0;

            if (!rawRoot || (!rawRoot.children?.length)) {
                container.attr('width', width).attr('height', height)
                    .append('text').attr('x', width/2).attr('y', height/2)
                    .attr('text-anchor', 'middle').style('fill', '#999')
                    .text('No matching tree data');
                updateBreadcrumb();
                return;
            }

            svg = container.attr('width', width).attr('height', height);

            zoom = d3.zoom().scaleExtent([0.1, 10])
                .on('zoom', (event) => g.attr('transform', event.transform));
            svg.call(zoom);
            g = svg.append('g').attr('transform', 'translate(40,0)');

            // ── Build hierarchy FIRST to count nodes ──
            hierarchyRoot = d3.hierarchy(rawRoot, d => d.children);
            hierarchyRoot.each(d => { d.id = ++nodeIdCounter; });
            
            // Count visible nodes and adjust tree height dynamically
            const visibleNodes = countVisibleNodes(hierarchyRoot);
            const minNodeSpacing = 25; // minimum pixels between nodes
            const dynamicHeight = Math.max(height - 40, visibleNodes * minNodeSpacing);
            
            treeLayout = d3.tree()
                .size([dynamicHeight, width - 250])
                .separation((a, b) => {
                    // Dynamic separation - more space for siblings, less for cousins
                    return (a.parent === b.parent ? 1.5 : 2);
                });

            // ── Collapse to depth 1 on initial load (show only root's direct children) ──
            function collapseRaw(node, depth, maxDepth = 1) {
                if (node.children && node.children.length > 0) {
                    node.children.forEach(ch => collapseRaw(ch, depth + 1, maxDepth));
                    if (depth >= maxDepth) {
                        node._children = node.children;
                        node.children = null;
                    }
                }
            }
            // Only collapse on first render (not when user has interacted)
            if (!window._treeInitialized) {
                collapseRaw(rawRoot, 0, 1);
                window._treeInitialized = true;
            }

            // Hierarchy already built above for node counting
            hierarchyRoot.x0 = dynamicHeight / 2;
            hierarchyRoot.y0 = 0;

            treeUpdate(hierarchyRoot);
            updateBreadcrumb();

            // On initial load, fit the collapsed tree to screen and center it.
            // Double rAF (rather than a fixed setTimeout) waits for the
            // browser to have actually laid out and painted the tree we just
            // rendered — the first rAF runs after this frame's layout, the
            // second guarantees that layout has been painted — before
            // fitToScreen measures anything. fitToScreen itself also retries
            // if it still gets an invalid bounding box.
            if (!window._treeAutoFitted) {
                window._treeAutoFitted = true;
                requestAnimationFrame(() => requestAnimationFrame(() => fitToScreen()));
            }
        }

        /**
         * treeUpdate: re-layout and re-render from the EXISTING hierarchyRoot.
         * We do NOT rebuild d3.hierarchy — we re-derive it from rawRoot
         * which has been mutated (children ↔ _children) by click handlers.
         */
        function treeUpdate(source) {
            const duration = 500;

            // Re-derive hierarchy from the (mutated) rawRoot
            const newHierarchy = d3.hierarchy(rawRoot, d => d.children);
            
            // Count visible nodes and adjust tree size dynamically
            const visibleNodes = countVisibleNodes(newHierarchy);
            const minNodeSpacing = 25;
            const treeBorder = document.querySelector('.tree-border');
            const width = treeBorder.clientWidth;
            const height = treeBorder.clientHeight;
            const dynamicHeight = Math.max(height - 40, visibleNodes * minNodeSpacing);
            
            // Update tree layout with new size
            treeLayout = d3.tree()
                .size([dynamicHeight, width - 250])
                .separation((a, b) => (a.parent === b.parent ? 1.5 : 2));
            
            treeLayout(newHierarchy);

            const nodes = newHierarchy.descendants();
            const links = newHierarchy.links();

            // Update SVG height if needed
            if (dynamicHeight > height) {
                svg.attr('height', dynamicHeight + 40);
            }

            // Fixed depth spacing
            nodes.forEach(d => { d.y = d.depth * 200; });

            // ── Assign stable IDs based on _path ──
            const idMap = new Map();
            nodes.forEach(d => {
                const key = d.data._path || d.data.name;
                if (!idMap.has(key)) idMap.set(key, ++nodeIdCounter);
                d.id = idMap.get(key);
            });

            // ═══ NODES ═══
            const node = g.selectAll('g.node')
                .data(nodes, d => d.data._path || d.data.name);

            // Enter
            const nodeEnter = node.enter().append('g')
                .attr('class', 'node')
                .attr('transform', `translate(${source.y0 || 0},${source.x0 || 0})`)
                .style('cursor', 'pointer');

            // Circle
            nodeEnter.append('circle')
                .attr('r', 1e-6)
                .style('stroke-width', '2px');

            // Label
            nodeEnter.append('text')
                .attr('dy', '.35em')
                .style('fill-opacity', 1e-6);

            // Merge
            const nodeUpdate = nodeEnter.merge(node);

            // Bind click + tooltip events on ALL nodes (enter + update)
            nodeUpdate
                .on('click', onNodeLeftClick)
                .on('contextmenu', onNodeRightClick)
                .on('mouseover', showTooltip)
                .on('mousemove', moveTooltip)
                .on('mouseout',  hideTooltip);

            nodeUpdate.transition().duration(duration)
                .attr('transform', d => `translate(${d.y},${d.x})`);

            nodeUpdate.select('circle')
                .attr('r', d => Math.max(5, Math.min(20, Math.sqrt((d.data.count || 1)) * 2)))
                .style('fill', d => {
                    // Has hidden children? → filled
                    return d.data._children ? '#b3d4fc' : (d.data._isMatchedLeaf ? '#fff7ed' : '#fff');
                })
                .style('stroke', d => d.data._isMatchedLeaf ? '#f97316' : '#4682b4')
                .style('stroke-width', d => d.data._isMatchedLeaf ? '3px' : '2px');

            nodeUpdate.select('text')
                .attr('x', d => (d.data.children?.length || d.data._children?.length) ? -13 : 13)
                .attr('text-anchor', d => (d.data.children?.length || d.data._children?.length) ? 'end' : 'start')
                .text(d => `${d.data.name} (${d.data.count || 0})`)
                .style('fill-opacity', 1)
                .style('font-weight', d => d.data._isMatchedLeaf ? '700' : '400')
                .style('fill', d => d.data._isMatchedLeaf ? '#9a3412' : '#374151')
                .style('font-size', '11px');

            // Exit
            const nodeExit = node.exit().transition().duration(duration)
                .attr('transform', `translate(${source.y || 0},${source.x || 0})`)
                .remove();
            nodeExit.select('circle').attr('r', 1e-6);
            nodeExit.select('text').style('fill-opacity', 1e-6);

            // ═══ LINKS ═══
            const link = g.selectAll('path.link')
                .data(links, d => d.target.data._path || d.target.data.name);

            const linkEnter = link.enter().insert('path', 'g')
                .attr('class', 'link')
                .attr('d', () => {
                    const o = { x: source.x0 || 0, y: source.y0 || 0 };
                    return diagonal(o, o);
                });

            linkEnter.merge(link).transition().duration(duration)
                .attr('d', d => diagonal(d.source, d.target));

            link.exit().transition().duration(duration)
                .attr('d', () => {
                    const o = { x: source.x || 0, y: source.y || 0 };
                    return diagonal(o, o);
                })
                .remove();

            // ── Stash positions for next transition ──
            nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });

            // Update source positions for next call
            source.x0 = source.x;
            source.y0 = source.y;

            // Re-apply subtree highlight after layout settles
            setTimeout(applySubtreeHighlight, 520);
        }

        // ═══════════════════════════════════════════════════════════════
        //  NODE INTERACTION
        // ═══════════════════════════════════════════════════════════════

        /**
         * LEFT-CLICK: toggle expand / collapse of this node's children.
         * Mutates the RAW data node (d.data), then re-renders.
         */
        function onNodeLeftClick(event, d) {
            event.stopPropagation();
            const raw = d.data;   // the raw JS object
            if (raw.children && raw.children.length > 0) {
                // Collapse: hide children
                raw._children = raw.children;
                raw.children = null;
            } else if (raw._children && raw._children.length > 0) {
                // Expand: show children
                raw.children = raw._children;
                raw._children = null;
            }
            // re-render from the same rawRoot
            treeUpdate(d);
        }

        /**
         * RIGHT-CLICK: focus / prune — re-root the tree to this node.
         * Only this node and its descendants are shown.
         */
        function onNodeRightClick(event, d) {
            event.preventDefault();
            event.stopPropagation();
            const path = d.data._path;
            if (!path) return;
            focusOnNode(path);
        }

        function focusOnNode(path) {
            focusedNodePath = path;
            const sub = findNodeByPath(fullRawRoot, path);
            if (sub) {
                rawRoot = deepCopy(sub);
                renderTree();
            }
        }

        function clearTreeFocus() {
            focusedNodePath = null;
            rawRoot = fullRawRoot;
            renderTree();
        }

        function diagonal(s, d) {
            return `M ${s.y} ${s.x} C ${(s.y + d.y)/2} ${s.x}, ${(s.y + d.y)/2} ${d.x}, ${d.y} ${d.x}`;
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            const name = DATASETS[currentTree].label;
            const count = rawRoot ? (rawRoot.count || 0) : 0;
            let html = `Viewing: <strong>${name}</strong> (${count.toLocaleString()} documents)`;

            if (focusedNodePath) {
                const parts = focusedNodePath.split('.');
                html += `<span class="tree-focus-path"> — Focused: `;
                parts.forEach((p, i) => {
                    const partial = parts.slice(0, i+1).join('.');
                    if (i > 0) html += `<span class="separator"> › </span>`;
                    html += `<span class="focus-crumb" onclick="focusOnNode('${partial}')">${esc(p)}</span>`;
                });
                html += `</span>`;
                html += `<span class="tree-focus-reset" onclick="clearTreeFocus()">✕ Full tree</span>`;
            } else {
                html += ` <span style="font-size:0.78rem;color:#9ca3af;margin-left:0.5rem;">💡 Left-click = expand/collapse · Right-click = focus subtree</span>`;
            }
            bc.innerHTML = html;
        }

        // ═══════════════════════════════════════════════════
        //  TABLE
        // ═══════════════════════════════════════════════════

        // Cleans up an authors field that sometimes arrives as a stringified
        // list — e.g. "['Neilens H', 'Allgar V', 'Sands KA', ...]" — instead
        // of the plain "Neilens H, Allgar V, Sands KA" comma-separated string
        // most records use, and trims very long author lists for display.
        function formatAuthors(raw) {
            if (!raw) return '';
            let names = raw.trim();
            if (/^\[.*\]$/.test(names)) {
                // Looks like a Python/JS list repr — pull out the quoted names.
                const matches = names.match(/'([^']*)'|"([^"]*)"/g) || [];
                names = matches.map(s => s.slice(1, -1)).join(', ');
            } else {
                names = names.replace(/,\s*$/, ''); // some records end with a trailing comma
            }
            const parts = names.split(',').map(s => s.trim()).filter(Boolean);
            const shown = (parts.length > 6 ? parts.slice(0, 6) : parts).map(esc).join(', ');
            return parts.length > 6 ? `${shown}, et al.` : shown;
        }

        // Shows a doc's first few subjects (its actual MeSH terms), with a
        // "+N more" indicator rather than dumping the whole subjects_array.
        function formatSubjects(doc, max = 3) {
            const subs = doc.subjects_array || [];
            if (!subs.length) return '—';
            const shown = subs.slice(0, max).map(esc).join(', ');
            return subs.length > max
                ? `${shown} <span style="color:#9ca3af;">+${subs.length - max} more</span>`
                : shown;
        }

        // Single source of truth for relevance, used by both the badge
        // rendered in the table AND the "relevance" sort column, so they
        // can never disagree with each other. Higher score = more relevant;
        // -1 means "selected subjects exist, but this doc doesn't match".
        function getRelevanceInfo(doc) {
            if (!selectedSubjects.length) return { score: 0, badge: '' };
            const titleLower = (doc.title_e || '').toLowerCase();
            const selectedSet = new Set(selectedSubjects);
            const inTitle = selectedSubjects.some(subj => titleMatchesMesh(titleLower, subj));

            let earliestPos = Infinity;
            (doc.subjects_array || []).forEach((s, i) => {
                if (selectedSet.has(s) && (i + 1) < earliestPos) earliestPos = i + 1;
            });

            if (inTitle) {
                return { score: 1000, badge: `<span class="relevance-badge relevance-primary">📌 Title</span>` };
            }
            if (earliestPos !== Infinity) {
                const cls = earliestPos === 1 ? 'relevance-primary'
                          : earliestPos <= 3  ? 'relevance-first'
                          :                    'relevance-secondary';
                return { score: 100 - earliestPos, badge: `<span class="relevance-badge ${cls}" title="Subject position ${earliestPos}">#${earliestPos} Subject</span>` };
            }
            return { score: -1, badge: '<span class="relevance-badge relevance-secondary">—</span>' };
        }

        function sortByColumn(col) {
            if (sortColumn === col) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = col;
                // Numbers/relevance default to "biggest first"; text defaults to A→Z.
                sortDirection = (col === 'impact' || col === 'citations' || col === 'relevance') ? 'desc' : 'asc';
            }
            currentPage = 1;
            updateDisplay();
        }

        function updateSortIndicators() {
            ['title', 'subjects', 'relevance', 'impact', 'citations'].forEach(col => {
                const el = document.getElementById(`sort-${col}`);
                if (!el) return;
                el.textContent = sortColumn === col ? (sortDirection === 'asc' ? '▲' : '▼') : '';
            });
        }

        function sortDocs(docs) {
            if (!sortColumn) return docs;
            const dir = sortDirection === 'asc' ? 1 : -1;
            return [...docs].sort((a, b) => {
                let av, bv;
                switch (sortColumn) {
                    case 'title':      av = (a.title_e || '').toLowerCase(); bv = (b.title_e || '').toLowerCase(); break;
                    case 'subjects':   av = (a.subjects_array[0] || '').toLowerCase(); bv = (b.subjects_array[0] || '').toLowerCase(); break;
                    case 'relevance':  av = getRelevanceInfo(a).score; bv = getRelevanceInfo(b).score; break;
                    case 'impact':     av = a.impact_factor; bv = b.impact_factor; break;
                    case 'citations':  av = a.citation_count; bv = b.citation_count; break;
                    default:           av = 0; bv = 0;
                }
                if (av < bv) return -1 * dir;
                if (av > bv) return 1 * dir;
                return 0;
            });
        }

        function updateTable(filteredData) {
            const tbody = document.getElementById('data-table-body');
            const info = document.getElementById('table-info');

            const sorted = sortDocs(filteredData);
            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, sorted.length);
            const page = sorted.slice(start, end);

            // Relevance only means anything once the person has actually
            // searched for a subject — with nothing selected, every row
            // would just show the same "—" placeholder, so hide the whole
            // column rather than display a column of dashes.
            const relevanceActive = selectedSubjects.length > 0;
            const relevanceHeader = document.getElementById('relevance-header');
            if (relevanceHeader) relevanceHeader.style.display = relevanceActive ? '' : 'none';
            updateSortIndicators();

            tbody.innerHTML = '';
            page.forEach(doc => {
                const relevanceCell = relevanceActive ? `<td>${getRelevanceInfo(doc).badge}</td>` : '';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="max-width:400px;">${doc.authors ? `<div style="font-size:0.78rem;color:#6b7280;margin-bottom:2px;">${formatAuthors(doc.authors)}</div>` : ''}${doc.title_e} <a href="https://pubmed.ncbi.nlm.nih.gov/${doc.pmid}/" target="_blank" class="pmid-link">[PMID: ${doc.pmid}]</a></td>
                    <td style="font-size:0.8rem;">${formatSubjects(doc)}</td>
                    ${relevanceCell}
                    <td>${doc.impact_factor.toFixed(2)}</td>
                    <td>${doc.citation_count}</td>`;
                tbody.appendChild(row);
            });

            info.textContent = `Showing ${filteredData.length > 0 ? start+1 : 0} to ${end} of ${filteredData.length} entries`;
            updatePagination(filteredData.length);
        }

        function updatePagination(total) {
            const pg = document.getElementById('pagination');
            const totalPages = Math.ceil(total / itemsPerPage);
            pg.innerHTML = '';

            const prev = document.createElement('button');
            prev.textContent = 'Previous'; prev.disabled = currentPage === 1;
            prev.onclick = () => { if (currentPage > 1) { currentPage--; updateDisplay(); } };
            pg.appendChild(prev);

            const s = Math.max(1, currentPage - 2);
            const e = Math.min(totalPages, currentPage + 2);
            for (let p = s; p <= e; p++) {
                const btn = document.createElement('button');
                btn.textContent = p;
                if (p === currentPage) btn.classList.add('active');
                btn.onclick = () => { currentPage = p; updateDisplay(); };
                pg.appendChild(btn);
            }

            const next = document.createElement('button');
            next.textContent = 'Next'; next.disabled = currentPage >= totalPages;
            next.onclick = () => { if (currentPage < totalPages) { currentPage++; updateDisplay(); } };
            pg.appendChild(next);
        }

        // ═══════════════════════════════════════════════════
        //  UTILITIES
        // ═══════════════════════════════════════════════════

        function switchTree(type) {
            currentTree = type;
            window._treeInitialized = false; // reset so new tree starts collapsed
            window._treeAutoFitted = false;  // reset so new tree also auto-fits
            Object.keys(DATASETS).forEach(id => {
                const btn = document.getElementById(`tree-btn-${id}`);
                if (btn) btn.classList.toggle('active', id === type);
            });
            focusedNodePath = null;
            highlightedSubtreeName = null;

            // Rebuild subject index for the new tree's dataset
            // (keeps autocomplete relevant to the active tree)
            buildSubjectIndex();

            // ── Preserve selectedSubjects across tree switch ──
            // Non-primary trees are filtered independently via
            // getFilteredDocsGeneric(), so we don't need to touch searchDim here.
            // Just re-render.
            renderSelectedTags();

            updateDisplay();
            // Repopulate subtree dropdown for the new tree (after tree is built)
            setTimeout(populateSubtreeDropdown, 100);
        }

        // ═══════════════════════════════════════════════════
        //  SUBTREE DROPDOWN + HIGHLIGHT
        // ═══════════════════════════════════════════════════

        function populateSubtreeDropdown() {
            const sel = document.getElementById('subtree-select');
            if (!sel || !rawRoot) return;
            const label = `${DATASETS[currentTree].icon} Jump to branch…`;
            sel.innerHTML = `<option value="">${label}</option>`;

            // rawRoot.children = level-1 nodes
            const kids = rawRoot.children || rawRoot._children || [];
            kids.forEach(child => {
                const opt = document.createElement('option');
                opt.value = child.name;
                opt.textContent = `${child.name}  (${(child.count||0).toLocaleString()})`;
                sel.appendChild(opt);
            });
        }

        function onSubtreeSelect(name) {
            highlightedSubtreeName = name || null;
            document.getElementById('subtree-clear-btn').style.display = name ? '' : 'none';
            applySubtreeHighlight();

            // Pan/zoom to that subtree node
            if (name && g && svg) {
                // Find the rendered node with this name
                const target = g.selectAll('g.node')
                    .filter(d => d.data.name === name);
                if (!target.empty()) {
                    const nodeData = target.datum();
                    const treeBorder = document.querySelector('.tree-border');
                    const w = treeBorder.clientWidth;
                    const h = treeBorder.clientHeight;
                    const scale = 0.75;
                    const tx = w / 2 - scale * nodeData.y;
                    const ty = h / 2 - scale * nodeData.x;
                    svg.transition().duration(600)
                        .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
                }
            }
        }

        function clearSubtreeHighlight() {
            highlightedSubtreeName = null;
            document.getElementById('subtree-select').value = '';
            document.getElementById('subtree-clear-btn').style.display = 'none';
            applySubtreeHighlight();
        }

        function applySubtreeHighlight() {
            if (!g) return;
            const name = highlightedSubtreeName;

            if (!name) {
                // Remove all highlight/dim classes
                g.selectAll('g.node')
                    .classed('subtree-highlight', false)
                    .classed('subtree-dim', false);
                g.selectAll('path.link')
                    .classed('subtree-highlight', false)
                    .classed('subtree-dim', false);
                return;
            }

            // Collect all node paths that belong to this subtree
            // A node belongs if its _path starts with the root.name segment
            const inSubtree = (d) => {
                if (!d.data._path) return d.data.name === name;
                const parts = d.data._path.split('.');
                return parts[1] === name || d.data.name === name;
            };

            g.selectAll('g.node').each(function(d) {
                const belongs = inSubtree(d);
                d3.select(this)
                    .classed('subtree-highlight', belongs)
                    .classed('subtree-dim', !belongs);
            });

            g.selectAll('path.link').each(function(d) {
                const belongs = inSubtree(d.target);
                d3.select(this)
                    .classed('subtree-highlight', belongs)
                    .classed('subtree-dim', !belongs);
            });
        }

        function zoomIn()    { if (svg) svg.transition().call(zoom.scaleBy, 1.3); }
        function zoomOut()   { if (svg) svg.transition().call(zoom.scaleBy, 0.7); }
        function resetZoom() { if (svg) svg.transition().call(zoom.transform, d3.zoomIdentity); }

        function fitToScreen(attemptsLeft = 6) {
            if (!g || !svg) return;
            const bounds = g.node().getBBox();
            const parent = svg.node().parentElement;
            const fw = parent.clientWidth, fh = parent.clientHeight;

            // If the SVG hasn't actually finished layout/paint yet — a zero
            // bbox or zero-size container, common right after a tree switch
            // or on first page load — computing the fit here would produce a
            // NaN/Infinity transform (this is what previously required a
            // manual "Reset Zoom" click to paper over). Retry next frame
            // instead of guessing with a fixed timeout.
            const scaleCandidate = (bounds.width && bounds.height && fw && fh)
                ? 0.85 / Math.max(bounds.width / fw, bounds.height / fh)
                : NaN;

            if (!isFinite(scaleCandidate) || scaleCandidate <= 0) {
                if (attemptsLeft > 0) requestAnimationFrame(() => fitToScreen(attemptsLeft - 1));
                return;
            }

            const midX = bounds.x + bounds.width / 2;
            const midY = bounds.y + bounds.height / 2;
            const scale = Math.min(3, scaleCandidate); // defensive cap, avoids an absurd zoom on a tiny/degenerate bbox
            const tx = fw/2 - scale * midX, ty = fh/2 - scale * midY;
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        }

        function toggleFullscreen() {
            const c = document.getElementById('tree-container');
            const icon = document.getElementById('fullscreen-icon');
            if (c.classList.contains('fullscreen')) {
                c.classList.remove('fullscreen'); icon.textContent = '⛶';
            } else {
                c.classList.add('fullscreen'); icon.textContent = '✕';
            }
            setTimeout(renderTree, 100);
        }

        function resetAllFilters() {
            dc.filterAll();
            document.getElementById('impact-range-label').textContent = 'All';
            document.getElementById('citations-range-label').textContent = 'All';
            document.getElementById('tree-select').value = '';
            document.getElementById('search-box').value = '';
            document.getElementById('search-focus-filter').value = 'all';
            searchFocusMode = 'all';
            selectedSubjects = []; renderSelectedTags();
            searchDim.filterAll();
            focusedNodePath = null; currentPage = 1;
            highlightedSubtreeName = null;
            document.getElementById('subtree-select').value = '';
            document.getElementById('subtree-clear-btn').style.display = 'none';
            listSelections.subjects.clear();
            listSelections.doctype.clear();
            subjectDim.filterAll();
            doctypeDim.filterAll();
            dc.redrawAll(); updateDisplay();
            highlightSelectedSubjectBars();
        }

        function changeItemsPerPage() {
            itemsPerPage = parseInt(document.getElementById('items-per-page').value);
            currentPage = 1; updateDisplay();
        }

        // ═══════════════════════════════════════════════════
        //  TREE EXPAND/COLLAPSE CONTROLS
        // ═══════════════════════════════════════════════════

        function expandAll() {
            if (!rawRoot) return;
            expandAllNodes(rawRoot);
            renderTree();
        }

        function collapseAll() {
            if (!rawRoot) return;
            collapseAllNodes(rawRoot, 0);
            renderTree();
        }

        function collapseToDepth(maxDepth) {
            if (!rawRoot) return;
            collapseAllNodes(rawRoot, 0);
            expandToDepth(rawRoot, 0, maxDepth);
            renderTree();
        }

        function expandAllNodes(node) {
            if (node._children) {
                node.children = node._children;
                node._children = null;
            }
            if (node.children) {
                node.children.forEach(expandAllNodes);
            }
        }

        function collapseAllNodes(node, depth) {
            if (node.children && node.children.length > 0) {
                node.children.forEach(ch => collapseAllNodes(ch, depth + 1));
                if (depth > 0) {
                    node._children = node.children;
                    node.children = null;
                }
            }
        }

        function expandToDepth(node, currentDepth, maxDepth) {
            if (currentDepth < maxDepth && node._children) {
                node.children = node._children;
                node._children = null;
            }
            if (node.children) {
                node.children.forEach(ch => expandToDepth(ch, currentDepth + 1, maxDepth));
            }
        }

        init();
    </script>
</body>
</html>
